<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            background-color: #f4f4f4;
        }
        h1 { text-align: center; color: #333; }
        form { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        ul { list-style: none; padding: 0; }
        li { background: white; padding: 10px; margin-bottom: 10px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        .done { text-decoration: line-through; color: gray; }
        a { margin-left: 10px; text-decoration: none; color: white; padding: 5px 10px; border-radius: 5px; }
        .complete-btn { background-color: #007bff; }
        .delete-btn { background-color: #dc3545; }
    </style>
</head>
<body>
    <h1>To-Do App</h1>
    <form action="/add" method="post">
        <input type="text" name="task" placeholder="Enter a task..." required>
        <button type="submit">Add</button>
    </form>
<ul>
    {% for todo in todos %}
    <li>
        <span class="{{ 'done' if todo.done else '' }}">{{ todo.task }}</span>
        <div>
            <a class="complete-btn" href="/complete/{{ loop.index0 }}">✓</a>
            <a class="delete-btn" href="/delete/{{ loop.index0 }}">✗</a>
        </div>
    </li>
    {% endfor %}
</ul>
</body>
</html>
