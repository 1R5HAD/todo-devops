name: Deploy To-Do App

on:
  push:
    branches:
      - main

jobs:

  # ── STAGE 1: TEST ────────────────────────────────────────────
  # Runs pytest against your app using a temporary SQLite DB.
  # If any test fails, the pipeline stops here — nothing deploys.
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v
        env:
          DATABASE_URL: sqlite:///test.db
          SECRET_KEY: test-secret-key


  # ── STAGE 2: BUILD ───────────────────────────────────────────
  # Only runs if ALL tests passed in Stage 1.
  # Builds Docker image and pushes to Docker Hub.
  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/todo-app:latest


  # ── STAGE 3: DEPLOY ──────────────────────────────────────────
  # Only runs if Stage 2 succeeded.
  # Triggers Render to pull the new image and redeploy.
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Trigger Render Deploy
        run: curl "${{ secrets.RENDER_DEPLOY_HOOK }}"
